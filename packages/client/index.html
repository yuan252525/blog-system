<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BlogSystem — Personal Blog</title>

    <!-- Editorial fonts: Playfair Display (serif display), Inter (sans), JetBrains Mono (labels) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&family=Playfair+Display:ital,wght@0,500;0,700;0,800;1,500;1,700&display=swap"
      rel="stylesheet"
    />

    <!-- Set theme before paint to avoid flash -->
    <script>
      (function () {
        try {
          var t = localStorage.getItem('blog-theme') || 'light';
          var el = document.documentElement;
          el.setAttribute('data-theme', t);
          el.style.colorScheme = t;
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
