version: "3.8"

services:
  # ==================== PostgreSQL 数据库 ====================
  postgres:
    image: postgres:16-alpine
    container_name: blog-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-blog_db}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-blog_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - blog-network

  # ==================== Redis 缓存 ====================
  redis:
    image: redis:7-alpine
    container_name: blog-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 128mb --maxmemory-policy allkeys-lru
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - blog-network

  # ==================== NestJS 后端服务 ====================
  server:
    build:
      context: .
      dockerfile: packages/server/Dockerfile
    container_name: blog-server
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@postgres:5432/${DB_NAME:-blog_db}?schema=public
      JWT_SECRET: ${JWT_SECRET:-your-super-secret-jwt-key-at-least-32-chars-long}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      CLIENT_URL: ${CLIENT_URL:-http://localhost:8080}
      PUBLIC_API_URL: ${PUBLIC_API_URL:-http://localhost:3000/api/v1}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_PUBLIC_ENDPOINT: ${MINIO_PUBLIC_ENDPOINT:-localhost}
      MINIO_PUBLIC_PORT: ${MINIO_PUBLIC_PORT:-9000}
      MINIO_USE_SSL: "false"
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin123}
      MINIO_BUCKET: ${MINIO_BUCKET:-blog-uploads}
      # 汽水音乐代理（可选；不配置则前端回退到免版权演示曲）
      QISHUI_MUSIC_API: ${QISHUI_MUSIC_API:-https://apicx.asia/api/qishuimusic}
      QISHUI_MUSIC_TOKEN: ${QISHUI_MUSIC_TOKEN:-}
    ports:
      - "${SERVER_PORT:-3000}:3000"
    networks:
      - blog-network
    # 启动时运行数据库迁移
    command: >
      sh -c "
        npx prisma migrate deploy --schema=prisma/schema.prisma &&
        node dist/src/main.js
      "

  # ==================== MinIO 对象存储 ====================
  minio:
    image: minio/minio:latest
    container_name: blog-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin123}
    ports:
      - "${MINIO_PORT:-9000}:9000"       # API 端口
      - "${MINIO_CONSOLE_PORT:-9001}:9001" # Console 端口
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - blog-network

  # ==================== Vite React 前端 ====================
  client:
    build:
      context: .
      dockerfile: packages/client/Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:3000/api/v1}
    container_name: blog-client
    restart: unless-stopped
    depends_on:
      - server
      - redis
    ports:
      - "${CLIENT_PORT:-8080}:80"
    networks:
      - blog-network

# ==================== 数据卷 ====================
volumes:
  pgdata:
    driver: local
  redisdata:
    driver: local
  miniodata:
    driver: local

# ==================== 网络 ====================
networks:
  blog-network:
    driver: bridge
